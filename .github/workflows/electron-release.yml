name: Electron Release

on:
  push:
    tags:
      - v*.*.*
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    environment: release-env

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_RELEASE_OWNER: ${{ github.repository_owner }}
      GH_RELEASE_REPO: ${{ github.event.repository.name }}
      CSC_IDENTITY_AUTO_DISCOVERY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create .env from release-env secrets
        shell: pwsh
        env:
          CT_BACKEND_URL: ${{ secrets.CT_BACKEND_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CT_BACKEND_URL)) {
            throw "Missing release-env secret: CT_BACKEND_URL"
          }

          $envLines = @(
            "CT_BACKEND_URL=$($env:CT_BACKEND_URL)"
          )

          $envLines | Out-File -FilePath .env -Encoding utf8NoBOM

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build distributables
        run: npm run dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-release
          path: |
            release/*.exe
            release/*.blockmap
            release/latest*.yml
          if-no-files-found: warn
          retention-days: 14
