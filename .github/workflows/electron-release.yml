name: Desktop Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  detect-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      version_changed: ${{ steps.version.outputs.version_changed }}

    steps:
      - name: Resolve version metadata
        id: version
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = "package.json";

            async function readVersion(ref) {
              const { data } = await github.rest.repos.getContent({
                owner,
                repo,
                path,
                ref,
              });

              if (Array.isArray(data) || !data.content) {
                throw new Error(`Unable to read ${path} at ${ref}`);
              }

              const raw = Buffer.from(data.content, data.encoding).toString("utf8");
              const parsed = JSON.parse(raw);
              if (!parsed.version || typeof parsed.version !== "string") {
                throw new Error(`Missing version field in ${path} at ${ref}`);
              }

              return parsed.version.trim();
            }

            const currentVersion = await readVersion(context.sha);
            const tag = `v${currentVersion}`;
            const beforeSha = context.payload.before;

            let previousVersion = null;
            let versionChanged = true;

            if (context.eventName === "push" && beforeSha && !/^0+$/.test(beforeSha)) {
              try {
                previousVersion = await readVersion(beforeSha);
                versionChanged = previousVersion !== currentVersion;
              } catch (error) {
                core.info(`Could not read previous version from ${beforeSha}: ${error.message}`);
                versionChanged = true;
              }
            }

            core.info(`Current version: ${currentVersion}`);
            core.info(`Previous version: ${previousVersion ?? "not-found"}`);
            core.info(`Version changed: ${versionChanged}`);

            core.setOutput("version", currentVersion);
            core.setOutput("tag", tag);
            core.setOutput("version_changed", versionChanged ? "true" : "false");

  release-windows:
    needs: detect-version
    if: github.event_name == 'workflow_dispatch' || needs.detect-version.outputs.version_changed == 'true'
    runs-on: windows-latest
    environment:
      name: release-env
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Create .env from GitHub Secrets
        env:
          CT_BACKEND_URL: ${{ secrets.CT_BACKEND_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CT_BACKEND_URL)) {
            throw "Missing secret: CT_BACKEND_URL"
          }

          @(
            "CT_BACKEND_URL=$($env:CT_BACKEND_URL)"
          ) | Set-Content -Path .env -Encoding UTF8

      - name: Build desktop release artifacts
        run: npm run dist:win

      - name: Validate update artifacts and feed metadata
        run: |
          $version = "${{ needs.detect-version.outputs.version }}"
          $expectedExe = "Connect-Setup-$version.exe"
          $exePath = Join-Path "release" $expectedExe
          $blockmapPath = "$exePath.blockmap"
          $latestYmlPath = Join-Path "release" "latest.yml"

          if (-not (Test-Path $exePath)) {
            throw "Missing expected installer artifact: $exePath"
          }

          if (-not (Test-Path $blockmapPath)) {
            throw "Missing expected blockmap artifact: $blockmapPath"
          }

          if (-not (Test-Path $latestYmlPath)) {
            throw "Missing latest.yml metadata file"
          }

          $latestRaw = Get-Content -Path $latestYmlPath -Raw
          if ($latestRaw -notmatch [Regex]::Escape($expectedExe)) {
            throw "latest.yml does not reference expected installer: $expectedExe"
          }

          Write-Host "Artifact validation passed for version $version"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          repository: nightdevx/connect-desktop
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ needs.detect-version.outputs.tag }}
          name: Connect Together Desktop v${{ needs.detect-version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          draft: false
          prerelease: false
          files: |
            release/Connect-Setup-*.exe
            release/Connect-Setup-*.exe.blockmap
            release/latest.yml
