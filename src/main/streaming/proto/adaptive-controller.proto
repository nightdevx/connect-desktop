syntax = "proto3";

package adaptivecontroller.v1;

message StreamProfileChangesRequest {
  string client_id = 1;
}

message ProfileChangeEvent {
  string profile = 1;
  string reason = 2;
  int64 timestamp_unix_ms = 3;

  uint32 width = 4;
  uint32 height = 5;
  uint32 frame_rate = 6;
  uint32 bitrate_kbps = 7;
  string codec = 8;
  string codec_profile = 9;
  uint32 keyframe_interval_ms = 10;

  uint32 network_score = 11;
  double rtt_ms = 12;
  double packet_loss_percent = 13;
  double bandwidth_kbps = 14;
  double jitter_ms = 15;
  string quality = 16;
  string probe_mode = 17;
}

message BandwidthEstimate {
  string room_id = 1;
  string source = 2;
  string profile = 3;
  uint64 bitrate_bps = 4;
  uint32 packets_lost = 5;
  uint32 packets_sent = 6;
  double rtt_ms = 7;
  int64 timestamp_unix_ms = 8;
}

message BandwidthEstimateAck {
  bool accepted = 1;
}

service QualityDecisionService {
  rpc StreamProfileChanges(StreamProfileChangesRequest)
      returns (stream ProfileChangeEvent);
  rpc ReportBandwidthEstimate(BandwidthEstimate)
      returns (BandwidthEstimateAck);
}
