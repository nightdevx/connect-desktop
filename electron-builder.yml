appId: com.nightdevx.connect-desktop
productName: Connect
icon: build/icon.ico
compression: normal
electronLanguages:
  - en-US
  - tr
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - public/images/logo.ico
  - public/images/logo.png
  - package.json
  - native/audio-loopback/index.js
  - native/audio-loopback/package.json
  - native/audio-loopback/build/Release/*.node
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.d.cts"
  - "!**/*.d.mts"
  - "!**/tsconfig*.json"
  - "!**/__tests__/**"
  - "!**/test/**"
  - "!**/tests/**"
asar: true
# Native .node must live outside the asar archive to be loadable at runtime.
asarUnpack:
  - native/**
extraResources:
  - from: .env.runtime
    to: .env.runtime
publish:
  provider: github
  owner: nightdevx
  repo: connect-desktop
  releaseType: release
win:
  icon: build/icon.ico
  artifactName: Connect-Setup-${version}.${ext}
  target:
    - nsis
nsis:
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
linux:
  icon: build/icons
  target:
    - AppImage
    - deb

deb:
  maintainer: nightdevx <nightdevx@github.com>



