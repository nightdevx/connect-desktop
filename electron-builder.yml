appId: com.nightdevx.connect-desktop
productName: Connect
icon: public/images/logo.ico
compression: maximum
electronLanguages:
  - en-US
  - tr
directories:
  output: release
  buildResources: build
files:
  - dist/**
  - public/images/logo.ico
  - package.json
  - "!**/*.map"
  - "!**/*.d.ts"
  - "!**/*.d.cts"
  - "!**/*.d.mts"
  - "!**/tsconfig*.json"
  - "!**/__tests__/**"
  - "!**/test/**"
  - "!**/tests/**"
asar: true
publish:
  provider: github
  owner: nightdevx
  repo: connect-desktop
  releaseType: release
win:
  icon: public/images/logo.ico
  artifactName: Connect-Setup-${version}.${ext}
  target:
    - nsis
nsis:
  installerIcon: public/images/logo.ico
  uninstallerIcon: public/images/logo.ico
  installerHeaderIcon: public/images/logo.ico
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
linux:
  target:
    - AppImage
